name: Scheduled Knowledge Hub publish

on:
  schedule:
    # 06:00 ICT (UTC+7) daily
    - cron: '0 23 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/content/insights/**'
      - 'content-queue/**'
      - 'src/lib/content-plan.ts'
      - '.github/workflows/scheduled-publish.yml'

concurrency:
  group: knowledge-hub-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import content queue (Notion / Make)
        run: npm run content:queue

      - name: Show editorial schedule
        run: npm run content:status

      - name: Commit imported articles
        id: content_commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/insights
          if [ -d content-queue/processed ]; then
            git add content-queue/processed
          fi
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No content queue changes to commit."
          else
            git commit -m "Import scheduled Knowledge Hub content"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static site
        run: npm run build

      - name: Deploy to Cloudflare Workers
        id: cf_deploy
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set — skip Wrangler deploy."
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"
          npm run cf:deploy

      - name: Trigger Cloudflare Pages rebuild
        if: steps.cf_deploy.outputs.configured != 'true' && steps.content_commit.outputs.changed != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: scheduled Knowledge Hub rebuild $(date -u +%F)"
          git push
          echo "Empty commit pushed to trigger Cloudflare Pages rebuild."

      - name: Publish summary
        if: always()
        run: |
          echo "Build completed. If deploy failed, check Cloudflare API token or rely on Cloudflare Pages auto-build."
