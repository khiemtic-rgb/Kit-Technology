name: Scheduled Knowledge Hub publish

on:
  schedule:
    # 06:00 ICT (UTC+7) daily
    - cron: '0 23 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/content/insights/**'
      - 'content-queue/**'
      - 'src/lib/content-plan.ts'
      - '.github/workflows/scheduled-publish.yml'

concurrency:
  group: knowledge-hub-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import content queue (Notion / Make)
        run: npm run content:queue

      - name: Show editorial schedule
        run: npm run content:status

      - name: Commit imported articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/insights content-queue/processed
          if git diff --staged --quiet; then
            echo "No content queue changes to commit."
          else
            git commit -m "Import scheduled Knowledge Hub content"
            git push
          fi

      - name: Build static site
        run: npm run build

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::warning::Skip Cloudflare deploy — add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in GitHub Secrets."
            exit 0
          fi
          npm run cf:deploy
