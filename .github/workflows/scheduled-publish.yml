name: Scheduled Knowledge Hub publish

on:
  schedule:
    # 06:00 ICT (UTC+7) — primary
    - cron: '0 23 * * *'
    # 08:00 ICT — backup if GitHub delays the primary run
    - cron: '0 1 * * *'
    # 12:00 ICT — afternoon catch-up
    - cron: '0 5 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/content/insights/**'
      - 'content-queue/**'
      - 'scripts/**'
      - 'src/lib/content-plan.ts'
      - '.github/workflows/scheduled-publish.yml'

concurrency:
  group: knowledge-hub-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set publish date (Vietnam)
        run: echo "PUBLISH_DATE=$(TZ=Asia/Ho_Chi_Minh date +%F)" >> "$GITHUB_ENV"

      - name: Verify OpenAI secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY is not set. Add it in GitHub → Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "OPENAI_API_KEY is configured."

      - name: Auto-publish articles and hero images (OpenAI)
        id: auto_publish
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LOCALE: vi
          MAX_ARTICLES_PER_RUN: 2
        run: npm run content:publish

      - name: Import manual content queue (optional)
        continue-on-error: true
        run: npm run content:queue

      - name: Commit published articles
        id: content_commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/insights public/images/insights
          if [ -d content-queue/processed ]; then
            git add content-queue/processed
          fi
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No content changes to commit."
          else
            git commit -m "Publish scheduled Knowledge Hub content"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Show editorial schedule
        run: npm run content:status

      - name: Verify today's articles are live
        env:
          LOCALE: vi
        run: npm run content:verify

      - name: Build static site
        env:
          PUBLISH_DATE: ${{ env.PUBLISH_DATE }}
        run: npm run build

      - name: Deploy to Cloudflare Workers
        id: cf_deploy
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set — skip Wrangler deploy."
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"
          npm run cf:deploy

      - name: Trigger Cloudflare Pages rebuild
        if: steps.cf_deploy.outputs.configured != 'true' && steps.content_commit.outputs.changed != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: scheduled Knowledge Hub rebuild $(date -u +%F)"
          git push
          echo "Empty commit pushed to trigger Cloudflare Pages rebuild."

      - name: Fail if auto-publish step errored
        if: steps.auto_publish.outcome == 'failure'
        run: |
          echo "::error::Auto-publish failed — see logs above. Partial changes may have been committed."
          exit 1

      - name: Publish summary
        if: always()
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Publish date: ${PUBLISH_DATE:-unknown}"
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::warning::Set OPENAI_API_KEY in repo Secrets for daily auto article + hero images."
          else
            echo "OPENAI_API_KEY is set — auto-publish runs at 06:00, 08:00, and 12:00 ICT."
          fi
