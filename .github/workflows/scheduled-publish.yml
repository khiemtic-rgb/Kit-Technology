name: Scheduled Knowledge Hub publish

on:
  schedule:
    # 05:00–12:00 ICT — GitHub cron is often delayed; multiple slots improve odds
    - cron: '0 22 * * *'
    - cron: '0 23 * * *'
    - cron: '0 0 * * *'
    - cron: '0 1 * * *'
    - cron: '0 2 * * *'
    - cron: '0 3 * * *'
    - cron: '0 4 * * *'
    - cron: '0 5 * * *'
    # Sunday 02:00 ICT — weekly batch prep (Saturday 19:00 UTC)
    - cron: '0 19 * * 6'
  workflow_dispatch:
    inputs:
      days_ahead:
        description: 'Generate content N days ahead (0 = today only, 7 = weekly prep)'
        required: false
        default: '0'
  push:
    branches: [main]
    paths:
      - 'src/content/insights/**'
      - 'content-queue/**'
      - 'scripts/**'
      - 'src/lib/content-plan.ts'
      - '.github/workflows/scheduled-publish.yml'

concurrency:
  group: knowledge-hub-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set publish date and prep mode (Vietnam)
        run: |
          echo "PUBLISH_DATE=$(TZ=Asia/Ho_Chi_Minh date +%F)" >> "$GITHUB_ENV"
          DISPATCH_AHEAD="${{ github.event.inputs.days_ahead }}"
          if [ -n "$DISPATCH_AHEAD" ] && [ "$DISPATCH_AHEAD" != "0" ]; then
            echo "DAYS_AHEAD=$DISPATCH_AHEAD" >> "$GITHUB_ENV"
            echo "MAX_ARTICLES_PER_RUN=10" >> "$GITHUB_ENV"
            echo "Weekly prep via workflow_dispatch (+${DISPATCH_AHEAD} days)."
          elif [ "${{ github.event_name }}" = "schedule" ] && [ "$(TZ=Asia/Ho_Chi_Minh date +%u)" = "7" ] && [ "$(TZ=Asia/Ho_Chi_Minh date +%H)" = "02" ]; then
            echo "DAYS_AHEAD=7" >> "$GITHUB_ENV"
            echo "MAX_ARTICLES_PER_RUN=10" >> "$GITHUB_ENV"
            echo "Sunday weekly prep — generating 7 days of content."
          else
            echo "Daily catch-up — today only."
          fi

      - name: Auto-publish articles and hero images (OpenAI)
        id: auto_publish
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LOCALE: vi
          MAX_ARTICLES_PER_RUN: ${{ env.MAX_ARTICLES_PER_RUN || '2' }}
          DAYS_AHEAD: ${{ env.DAYS_AHEAD || '0' }}
          HERO_IMAGE_MODE: ai
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::warning::OPENAI_API_KEY not set — skip content generation, deploy only."
            exit 0
          fi
          npm run content:publish

      - name: Import manual content queue (optional)
        continue-on-error: true
        run: npm run content:queue

      - name: Commit published articles
        id: content_commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/insights public/images/insights
          if [ -d content-queue/processed ]; then
            git add content-queue/processed
          fi
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No content changes to commit."
          else
            git commit -m "Publish scheduled Knowledge Hub content"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Show editorial schedule
        run: npm run content:status

      - name: Verify today's articles are live
        id: verify_publish
        continue-on-error: true
        env:
          LOCALE: vi
        run: npm run content:verify

      - name: Build static site
        env:
          PUBLISH_DATE: ${{ env.PUBLISH_DATE }}
          PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ secrets.PUBLIC_GOOGLE_SITE_VERIFICATION }}
          PUBLIC_CF_WEB_ANALYTICS_TOKEN: ${{ secrets.PUBLIC_CF_WEB_ANALYTICS_TOKEN }}
        run: npm run build

      - name: Deploy to Cloudflare Workers
        id: cf_deploy
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "success=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set — skip Wrangler deploy."
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"
          if npm run cf:deploy; then
            echo "success=true" >> "$GITHUB_OUTPUT"
          else
            echo "success=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Fallback git push (Wrangler deploy failed)
        if: steps.cf_deploy.outputs.success != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: scheduled Knowledge Hub rebuild $(date -u +%F)"
          git push
          echo "::warning::Wrangler deploy failed — pushed empty commit to trigger any git-connected Cloudflare build."

      - name: Fail if today's articles are missing
        if: steps.verify_publish.outcome == 'failure'
        run: |
          echo "::error::Today's scheduled articles are not in the repo. Run weekly prep or check OpenAI logs."
          exit 1

      - name: Warn if auto-publish had errors
        if: steps.auto_publish.outcome == 'failure'
        run: |
          echo "::warning::Auto-publish reported errors — check OpenAI / hero image logs. Continuing if verify passed."

      - name: Fail if deploy failed
        if: steps.cf_deploy.outputs.configured == 'true' && steps.cf_deploy.outputs.success != 'true'
        run: |
          echo "::error::Cloudflare Wrangler deploy failed. Update CLOUDFLARE_API_TOKEN with Workers Scripts Edit permission."
          exit 1

      - name: Publish summary
        if: always()
        run: |
          echo "Publish date: ${PUBLISH_DATE:-unknown}"
          echo "Strategy: weekly prep (7 days ahead) + daily build/deploy with PUBLISH_DATE."
          echo "Pre-generated articles go live on schedule without a new git commit each day."
